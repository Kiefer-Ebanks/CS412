<!-- Description: The form template for creating an idea -->

{% extends 'storyplanning/base.html' %}

{% block content %}

<h1>Create an Idea</h1>

<form action="{% url 'create_idea' %}" method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit">Create Idea</button>
</form>

{% endblock %}
