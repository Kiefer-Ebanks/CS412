<!-- Description: The login page for the story planning app -->

<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <h1>Login</h1>
        <form method="post" action="{% url 'login' %}" >
            {% csrf_token %}
            {{form}}
            <input type="submit" value="Login">

            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{request.GET.next}}">
            {% else %}
                <input type="hidden" name="next" value="{% url 'show_all_ideas' %}">
            {% endif %}
            
        </form>
    </body>
</html>
