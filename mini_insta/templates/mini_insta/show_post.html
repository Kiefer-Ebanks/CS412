<!-- Description: The page that displays a single post -->
<!-- The html template for a single post that takes in context from the views.py PostDetailView function to display the profile -->

{% extends 'mini_insta/base.html' %} <!-- linking to the base.html template-->

{% block content %}
<html>

    <main>
        <div class="post-container">
            <div class="post-header">
                <div class="post-profile-info">
                    {% if post.profile.profile_image_url %}
                    <div class="post-profile-image-container">
                        <a href="{% url 'show_profile' post.profile.pk %}">
                            <img src="{{ post.profile.profile_image_url }}" alt="Profile Image" class="post-profile-image">
                        </a>
                    </div>
                    {% endif %}
                    <a href="{% url 'show_profile' post.profile.pk %}" class="post-profile-link">
                        <p class="post-profile-name">{{ post.profile.display_name }}</p>
                    </a>
                </div>
                <p class="post-timestamp">Posted on {{ post.timestamp }}</p>
            </div>
            
            <div class="post-caption-section">
                <p class="post-caption">{{ post.caption }}</p>
            </div>
            
            <div class="post-photos-grid">
                {% for photo in post.get_all_photos %}
                <div class="post-photo-item">
                    <img src="{{ photo.image_url }}" alt="Post Photo" class="post-photo-image">
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
</html>
{% endblock %}
